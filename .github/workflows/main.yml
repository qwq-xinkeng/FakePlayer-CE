name: Build FakePlayer-CE (Fixed)

# 触发条件：当你推代码，或者手动点击运行按钮时触发
on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 把你的代码拉取到 GitHub 服务器上
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. 配置 Java 21 环境（代码要求的版本）
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    # 3. 给 gradlew 脚本赋予运行权限
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 4. 执行我们修改好的 ShadowJar 编译命令
    - name: Build with Gradle
      run: ./gradlew clean :fakeplayer-dist:shadowJar

    # 5. 把编译出来的 Jar 文件打包成 Artifact 供你下载
    - name: Upload Plugin Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FakePlayer-CE-Fixed-Plugin
        # 这里的路径对应你改过的 shadowJar 输出路径
        path: fakeplayer-dist/build/libs/FakePlayer-CE-Fixed.jar
